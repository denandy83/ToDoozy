<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoozy — Set New Password</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      max-width: 400px;
      width: 100%;
      background: #1e1e35;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 2.5rem;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: rgba(99, 102, 241, 0.15);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
      font-weight: bold;
      color: #6366f1;
      letter-spacing: -0.02em;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 0.875rem;
      font-weight: 300;
      color: #888;
      margin-bottom: 2rem;
    }
    label {
      display: block;
      font-size: 0.625rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: #888;
      margin-bottom: 0.375rem;
    }
    input[type="password"] {
      width: 100%;
      background: transparent;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 0.625rem 0.75rem;
      color: #e0e0e0;
      font-size: 0.875rem;
      font-weight: 300;
      outline: none;
      transition: border-color 200ms;
      margin-bottom: 1rem;
    }
    input[type="password"]:focus { border-color: rgba(99,102,241,0.5); }
    .hint {
      font-size: 0.625rem;
      color: #666;
      margin-bottom: 1.5rem;
      margin-top: -0.75rem;
    }
    button {
      width: 100%;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.625rem 1rem;
      font-size: 0.6875rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 200ms, opacity 200ms;
    }
    button:hover { background: rgba(99,102,241,0.8); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      padding: 0.625rem 0.75rem;
      font-size: 0.6875rem;
      font-weight: 300;
      color: #ef4444;
      margin-bottom: 1rem;
    }
    .success {
      text-align: center;
      padding: 1.5rem 0;
    }
    .success h2 {
      font-size: 1.125rem;
      font-weight: 300;
      color: #22c55e;
      margin-bottom: 0.75rem;
    }
    .success p {
      font-size: 0.875rem;
      font-weight: 300;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">TD</div>
    <h1>ToDoozy</h1>
    <p class="subtitle">Set a new password</p>

    <div id="form-container">
      <label for="password">New password</label>
      <input type="password" id="password" placeholder="New password" />

      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" placeholder="Confirm password" />

      <p class="hint">Requirements: 8+ characters, one uppercase, one lowercase, one number.</p>

      <div id="error" class="error" style="display:none;"></div>
      <button id="submit-btn" onclick="setPassword()">Set Password</button>
    </div>

    <div id="success" class="success" style="display:none;">
      <h2>Password updated!</h2>
      <p>You can close this tab and sign in to ToDoozy with your new password.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://znmgsyjkaftbnhtlcxrm.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpubWdzeWprYWZ0Ym5odGxjeHJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA2MTUsImV4cCI6MjA4OTM5NjYxNX0.FzDK5NRvauwrwgM7oaMqZqosYaY2nSeBlFsSQfzoDM0'

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    function showError(msg) {
      const el = document.getElementById('error')
      el.textContent = msg
      el.style.display = 'block'
    }

    function hideError() {
      document.getElementById('error').style.display = 'none'
    }

    function validatePassword(pw) {
      if (pw.length < 8) return 'At least 8 characters required'
      if (!/[A-Z]/.test(pw)) return 'Must contain at least one uppercase letter'
      if (!/[a-z]/.test(pw)) return 'Must contain at least one lowercase letter'
      if (!/[0-9]/.test(pw)) return 'Must contain at least one number'
      return null
    }

    // Exchange tokens from URL fragment
    window.addEventListener('load', async () => {
      const hash = window.location.hash.substring(1)
      const params = new URLSearchParams(hash)
      const accessToken = params.get('access_token')
      const refreshToken = params.get('refresh_token')
      if (accessToken && refreshToken) {
        const { error } = await supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken })
        if (error) {
          showError('This reset link has expired. Please request a new one.')
          document.getElementById('submit-btn').disabled = true
        }
      }
    })

    async function setPassword() {
      hideError()
      const pw = document.getElementById('password').value
      const confirm = document.getElementById('confirm').value
      const err = validatePassword(pw)
      if (err) { showError(err); return }
      if (pw !== confirm) { showError('Passwords do not match'); return }

      const btn = document.getElementById('submit-btn')
      btn.disabled = true
      btn.textContent = 'Saving...'

      const { error } = await supabase.auth.updateUser({ password: pw })
      if (error) {
        showError(error.message)
        btn.disabled = false
        btn.textContent = 'Set Password'
        return
      }

      document.getElementById('form-container').style.display = 'none'
      document.getElementById('success').style.display = 'block'
    }
  </script>
</body>
</html>
