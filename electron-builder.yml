appId: com.todoozy
productName: ToDoozy
directories:
  buildResources: resources
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
extraResources:
  - from: resources/iconTemplate.png
    to: iconTemplate.png
  - from: resources/iconTemplate@2x.png
    to: iconTemplate@2x.png
  - from: resources/icon.png
    to: icon.png
  - from: CHANGELOG.md
    to: CHANGELOG.md
mac:
  icon: resources/icon.png
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  identity: "Andy Cassiers (HXNS28BT9C)"
  notarize: true
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application data storage.
    - NSDownloadsFolderUsageDescription: Export functionality.
win:
  icon: resources/icon.png
  executableName: ToDoozy
linux:
  icon: resources/icon.png
  target:
    - AppImage
    - snap
    - deb
  maintainer: todoozy
  category: Utility
publish:
  provider: github
  owner: denandy83
  repo: ToDoozy
npmRebuild: false
